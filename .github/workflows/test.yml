name: SIKOSA Integration Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env.test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          {
            echo "NODE_ENV='test'"
            echo "APP_ORIGIN='http://localhost:5173'"
            echo "MONGO_URI='mongodb://localhost:27017/sikosa'"
            echo "JWT_SECRET='$JWT_SECRET'"
            echo "JWT_REFRESH_SECRET='$JWT_REFRESH_SECRET'"
            echo "EMAIL_SENDER='$EMAIL_SENDER'"
            echo "RESEND_API_KEY='$RESEND_API_KEY'"
            echo "FE_ORIGIN='http://localhost:5173'"
            echo "PORT='5000'"
            echo "GROQ_API_KEY='test-api-key'"
          } > .env.test

      - name: Run Tests
        run: npm test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/reports/
            backend/coverage/
          retention-days: 7
